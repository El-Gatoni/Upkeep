<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Upkeep</title><link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617"><style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Arial;background:#020617;color:white}
.container{padding:16px;padding-bottom:100px;max-width:430px;margin:auto}
.header{margin-bottom:12px}
.card{background:#0f172a;border-radius:22px;padding:16px;margin-bottom:16px;box-shadow:0 10px 25px rgba(0,0,0,0.6)}
h2,h3{margin:0}
input,select,button{width:100%;padding:12px;border-radius:14px;border:none;margin-top:8px;font-size:14px}
button{background:#22c55e;color:white;font-weight:bold}
.small{font-size:12px;color:#94a3b8}
.car-img{width:100%;border-radius:16px;margin-top:10px;object-fit:cover;height:150px}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#020617;display:flex;justify-content:space-around;padding:14px;border-top:1px solid #1e293b}
.tabbar button{background:none;color:#64748b;font-size:22px}
.tabbar button.active{color:#22c55e}
.action-btn{background:#ef4444;margin-top:6px}
.maintenance-item{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.icon{width:45px;height:45px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}
.yellow{background:#facc15}
.blue{background:#60a5fa}
.green{background:#34d399}
.orange{background:#fb923c}
.purple{background:#a78bfa}
</style></head>
<body><div class="container" id="app"></div><div class="tabbar">
<button onclick="setPage('home')">🏡</button>
<button onclick="setPage('maintenance')">🛠️</button>
<button onclick="setPage('expenses')">💳</button>
<button onclick="setPage('stats')">📈</button>
<button onclick="setPage('settings')">⚙️</button>
</div><script>
let state = JSON.parse(localStorage.getItem('upkeep')||'{"vehicle":{},"expenses":[],"maintenance":[]}');
let page='home';

function save(){localStorage.setItem('upkeep',JSON.stringify(state));render();}
function setPage(p){page=p;render();}

function render(){
 const app=document.getElementById('app');

 if(page==='home'){
  let v=state.vehicle;
  app.innerHTML=`
  <div class="header"><h2>Accueil</h2></div>

  ${v.brand?`<div class="card">
    <b>${v.brand} ${v.model}</b><br>
    <span class="small">${v.plate||''}</span>
    ${v.image?`<img src="${v.image}" class="car-img">`:''}
  </div>`:'<div class="card">Aucun véhicule configuré</div>'}
  `;
 }

 if(page==='maintenance'){
  app.innerHTML=`
  <div class="header"><h3>Entretien</h3></div>

  ${state.maintenance.map(m=>`
    <div class="maintenance-item">
      <div class="icon ${m.color}">${m.icon}</div>
      <div>
        <b>${m.title}</b><br>
        <span class="small">${m.date}</span>
      </div>
    </div>
  `).join('')}

  <div class="card">
    <h4>Ajouter entretien</h4>
    <input id="title" placeholder="Ex: Vidange, Pneus">
    <input id="date" type="date">
    <select id="icon">
      <option value="🛠️|yellow">Entretien</option>
      <option value="📋|blue">Contrôle technique</option>
      <option value="🛡️|green">Assurance</option>
      <option value="⛽|orange">Carburant</option>
      <option value="🖼️|purple">Autre</option>
    </select>
    <button onclick="addMaintenance()">Ajouter</button>
  </div>
  `;
 }

 if(page==='expenses'){
  let order=['Essence','Entretien','Réparation','Assurance','Autre'];
  let total=state.expenses.reduce((a,b)=>a+Number(b.amount||0),0);

  app.innerHTML=`
  <div class="header"><h3>Dépenses</h3></div>

  <div class="card">💰 Total : ${total}€</div>

  <div class="card">
    <select id="type">
      ${order.map(o=>`<option>${o}</option>`).join('')}
    </select>
    <input id="amount" placeholder="Montant">
    <input id="date" type="date">
    <button onclick="addExpense()">Ajouter</button>
  </div>

  ${state.expenses.map(e=>`<div class="card small">${e.date} - ${e.type} : ${e.amount}€</div>`).join('')}
  `;
 }

 if(page==='stats'){
  app.innerHTML=`<div class="header"><h3>Statistiques</h3></div><div class="card"><canvas id="chart"></canvas></div>`;
  drawChart();
 }

 if(page==='settings'){
  let v=state.vehicle;
  app.innerHTML=`
  <div class="header"><h3>Paramètres</h3></div>

  <div class="card">
    <h4>Véhicule</h4>
    <input id="plate" placeholder="Immatriculation" value="${v.plate||''}">
    <input id="brand" placeholder="Marque" value="${v.brand||''}">
    <input id="model" placeholder="Modèle" value="${v.model||''}">
    <input id="year" placeholder="Année" value="${v.year||''}">
    <input id="photo" type="file" accept="image/*">
    <button onclick="saveVehicle()">Enregistrer</button>
  </div>

  <div class="card small">
  ⚠️ Données stockées localement. Export recommandé régulièrement.
  </div>

  <div class="card">
    <button onclick="exportData()">Exporter JSON</button>
    <input type="file" onchange="importData(event)">
  </div>
  `;
 }
}

function saveVehicle(){
 const file=document.getElementById('photo').files[0];
 const reader=new FileReader();
 reader.onload=()=>{
  state.vehicle={plate:plate.value,brand:brand.value,model:model.value,year:year.value,image:reader.result};
  save();
 };
 if(file) reader.readAsDataURL(file);
 else save();
}

function addExpense(){
 state.expenses.push({type:type.value,amount:amount.value,date:date.value});
 save();
}

function addMaintenance(){
 let val=icon.value.split('|');
 state.maintenance.push({title:title.value,date:date.value,icon:val[0],color:val[1]});
 save();
}

function exportData(){
 const blob=new Blob([JSON.stringify(state)],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='upkeep.json';
 a.click();
}

function importData(e){
 const reader=new FileReader();
 reader.onload=()=>{state=JSON.parse(reader.result);save();};
 reader.readAsText(e.target.files[0]);
}

function drawChart(){
 let ctx=document.getElementById('chart').getContext('2d');
 let months=Array(12).fill(0);
 state.expenses.forEach(e=>{
  let m=new Date(e.date).getMonth();
  months[m]+=Number(e.amount||0);
 });
 let max=Math.max(...months,1);
 ctx.clearRect(0,0,300,200);
 months.forEach((v,i)=>{
  let h=(v/max)*150;
  ctx.fillRect(i*25,180-h,18,h);
 });
}

render();
</script></body>
</html>
